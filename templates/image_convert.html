{% extends 'base.html' %}

{% block content %}
<!-- 💡 核心修改：使用统一的高颜值蓝色计数小角标 -->
<div class="usage-badge">📊 已累计转换: {{ counts.image_convert }} 次</div>

<h2>高级图片格式转换</h2>
<p class="subtitle">全面支持全格式智能检测互转，附带动态参数视窗调节。</p>

<style>
    .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
    .form-group.hidden { display: none; } /* 隐藏不适用的控制组件 */
    label { font-weight: 600; color: var(--text-main); font-size: 15px; }
    .drop-zone { border: 2px dashed #cbd5e0; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; background: rgba(0,0,0,0.01); }
    select, input[type="range"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: var(--form-bg); color: var(--text-main); font-size: 15px; transition: all 0.2s ease; }
    .slider-box { display: flex; align-items: center; gap: 15px; }
    .slider-val { font-weight: bold; color: #3182ce; min-width: 45px; text-align: right; }
    
    /* 统一的蓝色渐变按钮 */
    .btn-submit { background: linear-gradient(135deg, #3182ce, #2b6cb0); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3); transition: all 0.2s ease; }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(49, 130, 206, 0.4); }
</style>

<form action="/image-convert" method="POST" enctype="multipart/form-data">
    <div class="form-group">
        <label>选择或拖拽上传图片</label>
        <!-- 💡 修复核心：将 input 移出 drop-zone 避免点击事件发生嵌套和冒泡冲突 -->
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <span id="file-info" style="color: var(--text-sub); font-size: 14px;">📂 点击此处选择图片，支持拖拽文件</span>
        </div>
        <!-- input 现在是独立节点，隐藏展示但功能完美触发 -->
        <input type="file" name="image" id="fileInput" accept="image/*" required onchange="updateFileName()" style="display: none;">
    </div>
    
    <div class="form-group">
        <label for="format">目标转换格式</label>
        <select name="format" id="format" onchange="handleFormatChange()">
            <option value="PNG">PNG (无损格式)</option>
            <option value="JPEG">JPEG (高保真压缩)</option>
            <option value="WEBP">WEBP (流媒体高压)</option>
            <option value="GIF">GIF (传统图格式)</option>
            <option value="ICO">ICO (站点图标)</option>
        </select>
    </div>

    <!-- 联动区 1：仅对 JPEG/WEBP 展现的质量压缩器 -->
    <div class="form-group hidden" id="quality-wrapper">
        <label>压缩质量调节</label>
        <div class="slider-box">
            <input type="range" name="quality" min="10" max="100" value="90" oninput="document.getElementById('q-val').innerText = this.value + '%'">
            <span class="slider-val" id="q-val">90%</span>
        </div>
    </div>

    <!-- 联动区 2：仅对 ICO 展现的规格尺寸选择框 -->
    <div class="form-group hidden" id="ico-size-wrapper">
        <label for="ico_size">ICO 图标常规规格（像素）</label>
        <select name="ico_size" id="ico_size">
            <option value="16">16 x 16 (小微标签栏常用)</option>
            <option value="32" selected>32 x 32 (标准网页 favicon)</option>
            <option value="64">64 x 64 (高清收藏夹尺寸)</option>
            <option value="128">128 x 128 (操作系统大图标)</option>
            <option value="256">256 x 256 (超清无损图标极限)</option>
        </select>
    </div>

    <!-- 💡 新增功能区 1：固定像素大小下拉选择框 -->
    <div class="form-group" id="pixel-wrapper">
        <label for="pixel_size">像素大小</label>
        <select name="pixel_size" id="pixel_size" onchange="handlePixelChange()">
            <option value="none" selected>不改变</option>
            <option value="512">512 × 512</option>
            <option value="1024">1024 × 1024</option>
        </select>
    </div>

    <!-- 联动区 3：对普通格式开放的分辨率按比例缩放器（受固定像素选择的影响会动态锁定） -->
    <div class="form-group" id="scale-wrapper">
        <label id="scale-label">调整分辨率（等比例缩放比例）</label>
        <div class="slider-box">
            <input type="range" name="scale" id="scale-slider" min="0.1" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('s-val').innerText = this.value + 'x'">
            <span class="slider-val" id="s-val">1.0x</span>
        </div>
    </div>

    <!-- 💡 新增功能区 2：固定圆角百分比下拉选择框 -->
    <div class="form-group" id="radius-wrapper">
        <label for="corner_radius">圆角百分比</label>
        <select name="corner_radius" id="corner_radius">
            <option value="0" selected>不改变</option>
            <option value="10">10%</option>
            <option value="20">20%</option>
            <option value="30">30%</option>
            <option value="40">40%</option>
            <option value="50">50%</option>
        </select>
    </div>
    
    <button type="submit" class="btn-submit">⚡ 开始转换并下载</button>
</form>

<script>
    function updateFileName() {
        const input = document.getElementById('fileInput');
        const info = document.getElementById('file-info');
        if(input.files.length > 0) { 
            // 💡 修复原基础代码中遗漏的 files 数组下标，保证文件名能够正确读取展示
            info.innerText = "已加载: " + input.files[0].name; 
            info.style.color = "#3182ce"; 
        }
    }

    // 智能交互：当选择了 512 或 1024 固定像素时，等比例滑块自动失效变灰，防止多重缩放指令打架
    function handlePixelChange() {
        const pixelSize = document.getElementById('pixel_size').value;
        const scaleSlider = document.getElementById('scale-slider');
        const scaleLabel = document.getElementById('scale-label');

        if (pixelSize !== 'none') {
            scaleSlider.disabled = true;
            scaleSlider.style.opacity = "0.3";
            scaleLabel.style.opacity = "0.3";
            scaleLabel.innerText = "调整分辨率（已由固定像素规格接管）";
        } else {
            scaleSlider.disabled = false;
            scaleSlider.style.opacity = "1";
            scaleLabel.style.opacity = "1";
            scaleLabel.innerText = "调整分辨率（等比例缩放比例）";
        }
    }

    // 核心联动函数：根据目标格式，自动隐藏/显示高级控制模块
    function handleFormatChange() {
        const format = document.getElementById('format').value;
        const qWrapper = document.getElementById('quality-wrapper');
        const icoWrapper = document.getElementById('ico-size-wrapper');
        const scaleWrapper = document.getElementById('scale-wrapper');
        const pixelWrapper = document.getElementById('pixel-wrapper');
        const radiusWrapper = document.getElementById('radius-wrapper');

        // 1. 质量面板联动 (仅 JPEG/WEBP 适用)
        if (format === 'JPEG' || format === 'WEBP') { qWrapper.classList.remove('hidden'); } 
        else { qWrapper.classList.add('hidden'); }

        // 2. 高级尺寸与属性联动 (ICO 格式强制走固定规格，关闭普通缩放、像素及圆角控制)
        if (format === 'ICO') {
            icoWrapper.classList.remove('hidden');
            scaleWrapper.classList.add('hidden');
            pixelWrapper.classList.add('hidden');
            radiusWrapper.classList.add('hidden');
        } else {
            icoWrapper.classList.add('hidden');
            scaleWrapper.classList.remove('hidden');
            pixelWrapper.classList.remove('hidden');
            radiusWrapper.classList.remove('hidden');
            handlePixelChange(); // 重新检查当前像素下拉状态，决定是否需要锁定比例滑块
        }
    }

    // 初始化加载
    window.onload = handleFormatChange;
</script>
{% endblock %}
