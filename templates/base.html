<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧰 智能交互工具箱 v5.0</title>
    <style>
        :root {
            --bg-body: #f0f4f8; --bg-card: #ffffff; --text-main: #2d3748; --text-sub: #718096;
            --border-color: rgba(226, 232, 240, 0.8); --nav-gradient: linear-gradient(135deg, #1a365d, #2a4365);
            --nav-text: #e2e8f0; --form-bg: #ffffff; --input-border: #cbd5e0; --footer-text: #718096;
        }
        [data-theme="dark"] {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8;
            --border-color: rgba(51, 65, 85, 0.8); --nav-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --nav-text: #94a3b8; --form-bg: #0f172a; --input-border: #334155; --footer-text: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        .navbar { background: var(--nav-gradient); box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { color: #fff; font-size: 22px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links { display: flex; gap: 5px; list-style: none; align-items: center; }
        .nav-links a, .dropdown-btn { color: var(--nav-text); text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; border: none; background: none; cursor: pointer; }
        .nav-links a.active, .nav-links a:hover, .dropdown:hover .dropdown-btn { color: #fff; background-color: rgba(255,255,255,0.15); }
        
        /* 🆕 核心新增：高级下拉悬浮菜单样式 */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background-color: var(--bg-card); min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); border-radius: 12px; padding: 8px 0; z-index: 1010; top: 100%; right: 0; border: 1px solid var(--border-color); }
        .dropdown-content a { color: var(--text-main) !important; padding: 12px 20px; text-decoration: none; display: block; font-weight: 500; border-radius: 0; }
        .dropdown-content a:hover { background-color: rgba(49, 130, 206, 0.1); color: #3182ce !important; }
        .dropdown:hover .dropdown-content { display: block; }
        
        .theme-toggle { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .container { flex: 1; max-width: 900px; width: 100%; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border-color); position: relative; }
        h2 { margin-bottom: 12px; color: var(--text-main); text-align: center; font-size: 26px; }
        .subtitle { text-align: center; color: var(--text-sub); margin-bottom: 35px; font-size: 15px; }
        
        /* 🆕 使用指南公共样式箱 */
        .instruction-box { margin-top: 40px; padding: 25px; background: rgba(0,0,0,0.02); border-radius: 12px; border-left: 5px solid #3182ce; }
        [data-theme="dark"] .instruction-box { background: rgba(255,255,255,0.02); }
        .instruction-box h3 { font-size: 18px; margin-bottom: 12px; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
        .instruction-box ul { margin-left: 20px; color: var(--text-sub); font-size: 14px; line-height: 22px; }
        .instruction-box .example-tag { margin-top: 12px; padding: 10px; background: var(--form-bg); border-radius: 6px; font-family: monospace; font-size: 13px; border: 1px dashed var(--border-color); color: var(--text-main); }

        .usage-badge { position: absolute; top: 20px; right: 25px; font-size: 12px; font-weight: bold; color: var(--text-sub); background: rgba(0,0,0,0.03); padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border-color); }
        .site-footer { text-align: center; padding: 25px 20px; font-size: 14px; color: var(--footer-text); border-top: 1px solid var(--border-color); margin-top: auto; }
        .visit-num { color: #3182ce; font-weight: bold; font-family: monospace; font-size: 16px; background: rgba(49, 130, 206, 0.08); padding: 2px 8px; border-radius: 4px; }

        @media (max-width: 992px) {
            .nav-container { flex-direction: column; gap: 15px; }
            .nav-right { flex-direction: column; gap: 10px; width: 100%; }
            .nav-links { flex-wrap: wrap; justify-content: center; width: 100%; }
            .dropdown-content { right: unset; left: 50%; transform: translateX(-50%); }
            .usage-badge { position: static; text-align: center; margin: -20px auto 25px auto; width: fit-content; display: block; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">🧰 ONLINE TOOLS</a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="/image-convert" class="{% if active_page == 'image_convert' %}active{% endif %}">🖼️ 图片格式转换</a></li>
                    <li><a href="/doc-convert" class="{% if active_page == 'doc_convert' %}active{% endif %}">📄 文档转换舱</a></li>
                    <li><a href="/calculator" class="{% if active_page == 'calculator' %}active{% endif %}">🧮 在线计算机</a></li>
                    <li><a href="/password" class="{% if active_page == 'password' %}active{% endif %}">🔐 密码生成器</a></li>
                    <!-- 🆕 更多工具高级收纳下拉按钮 -->
                    <li class="dropdown">
                        <button class="dropdown-btn">🎛️ 更多工具 ▼</button>
                        <div class="dropdown-content">
                            <a href="/text-clean">📋 文本清洗舱</a>
                            <a href="/qrcode-tool">🔮 二维码矩阵</a>
                            <a href="/time-tool">⏱️ 时间沙漏</a>
                            <a href="/img-compress">🗜️ 静态图片压缩</a>
                        </div>
                    </li>
                    <li><a href="https://xs.12332167.xyz" target="_blank">📚 小说检索舱 ↗</a></li>
                </ul>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">✨ 极光模式</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="site-footer">
        <p>© 2026 智能多功能工具箱 | 全站总访问量:<span class="visit-num">{{ counts.total_visit }}</span>次</p>
    </footer>

    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            updateThemeButton(targetTheme);
        }
        function updateThemeButton(theme) {
            document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '🌙 深邃模式' : '✨ 极光模式';
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeButton(savedTheme);
    </script>
</body>
</html>
