{% extends 'base.html' %}

{% block content %}
<!-- 💡 核心修改：使用统一的高颜值蓝色计数小角标 -->
<div class="usage-badge">📊 已累计处理: {{ counts.doc_convert }} 次</div>

<h2>智能文档处理舱</h2>
<p class="subtitle">安全绿色的纯 Python 处理引擎，提供 PDF 转 Word / Excel 及多 PDF 快速合并功能。</p>

<style>
    .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
    .form-group.hidden { display: none; }
    label { font-weight: 600; color: var(--text-main); font-size: 15px; }
    .drop-zone { border: 2px dashed #cbd5e0; padding: 35px; text-align: center; border-radius: 12px; cursor: pointer; background: rgba(0,0,0,0.01); }
    select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: var(--form-bg); color: var(--text-main); font-size: 15px; }
    
    /* 统一的蓝色渐变按钮 */
    .btn-submit { background: linear-gradient(135deg, #3182ce, #2b6cb0); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3); }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(49, 130, 206, 0.4); }
</style>

<form action="/doc-convert" method="POST" enctype="multipart/form-data">
    <div class="form-group">
        <label for="convert_type">选择处理功能</label>
        <select name="convert_type" id="convert_type" onchange="handleTypeChange()">
            <option value="pdf_to_word" selected>📄 PDF 转换成 Word (.docx)</option>
            <option value="pdf_to_excel">📊 PDF 提取转换成 Excel (.xlsx)</option>
            <option value="pdf_merge">🧩 多个 PDF 文件合并 (.pdf)</option>
        </select>
    </div>

    <!-- 区域一：针对单文件转换 -->
    <div class="form-group" id="single-file-wrapper">
        <label id="single-label">上传待处理的 PDF 文档</label>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <span id="file-info" style="color: var(--text-sub); font-size: 14px;">📂 点击此处选择单个 PDF 文档</span>
            <input type="file" name="doc_file" id="fileInput" accept=".pdf">
        </div>
    </div>

    <!-- 区域二：针对多文件合并 -->
    <div class="form-group hidden" id="multi-file-wrapper">
        <label>选择两个或多个 PDF 进行合并</label>
        <div class="drop-zone" onclick="document.getElementById('mergeInput').click()">
            <span id="merge-info" style="color: var(--text-sub); font-size: 14px;">📂 按住 Ctrl 键可同时选择多个 PDF 文件</span>
            <input type="file" name="merge_files" id="mergeInput" accept=".pdf" multiple>
        </div>
    </div>
    
    <button type="submit" class="btn-submit">⚡ 开始处理</button>
</form>

<script>
    document.getElementById('fileInput').onchange = function() {
        if(this.files.length > 0) {
            document.getElementById('file-info').innerText = "已加载文档: " + this.files[0].name;
            // 💡 统一改为蓝色提示字
            document.getElementById('file-info').style.color = "#3182ce";
        }
    };

    document.getElementById('mergeInput').onchange = function() {
        if(this.files.length > 0) {
            document.getElementById('merge-info').innerText = "已成功加入 " + this.files.length + " 个 PDF 文件";
            // 💡 统一改为蓝色提示字
            document.getElementById('merge-info').style.color = "#3182ce";
        }
    };

    function handleTypeChange() {
        const type = document.getElementById('convert_type').value;
        const singleWrapper = document.getElementById('single-file-wrapper');
        const multiWrapper = document.getElementById('multi-file-wrapper');
        const singleLabel = document.getElementById('single-label');
        
        document.getElementById('fileInput').value = "";
        document.getElementById('mergeInput').value = "";
        document.getElementById('file-info').innerText = "📂 点击此处选择单个 PDF 文档";
        document.getElementById('merge-info').innerText = "📂 按住 Ctrl 键可同时选择多个 PDF 文件";
        document.getElementById('file-info').style.color = "var(--text-sub)";
        document.getElementById('merge-info').style.color = "var(--text-sub)";

        if (type === 'pdf_to_word' || type === 'pdf_to_excel') {
            singleWrapper.classList.remove('hidden');
            multiWrapper.classList.add('hidden');
            document.getElementById('fileInput').required = true;
            document.getElementById('mergeInput').required = false;
            
            singleLabel.innerText = type === 'pdf_to_word' ? "上传待处理的 PDF 文档" : "上传包含表格数据的 PDF 文档";
        } else {
            singleWrapper.classList.add('hidden');
            multiWrapper.classList.remove('hidden');
            document.getElementById('fileInput').required = false;
            document.getElementById('mergeInput').required = true;
        }
    }
    window.onload = handleTypeChange;
</script>
{% endblock %}
