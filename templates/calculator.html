{% extends 'base.html' %}

{% block content %}
<!-- 动态使用次数小角标 -->
<div class="usage-badge">📊 已累计计算: <span id="local-calc-count">{{ counts.calculator }}</span> 次</div>

<h2>在线拟物计算器</h2>
<p class="subtitle">支持基础的连续四则加减乘除运算，完美适配全站色彩主题。</p>

<style>
    /* 拟物化计算器外壳 */
    .calc-box { 
        max-width: 340px; 
        margin: 0 auto; 
        background: #171c26; 
        padding: 25px; 
        border-radius: 24px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.25); 
    }
    
    /* 屏幕显示区域 */
    #screen { 
        width: 100%; 
        height: 75px; 
        background: transparent; 
        color: #ffffff; 
        border: none; 
        text-ok: none;
        text-align: right; 
        padding: 10px; 
        font-size: 38px; 
        font-family: 'Courier New', Courier, monospace; 
        border-radius: 12px; 
        margin-bottom: 20px; 
        outline: none; 
    }
    
    /* 按键网格布局 */
    .btn-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 12px; 
    }
    
    /* 统一按钮样式 */
    .btn-grid button { 
        padding: 18px 0; 
        font-size: 20px; 
        font-weight: 600; 
        border: none; 
        border-radius: 50%; 
        cursor: pointer; 
        transition: transform 0.1s ease, background-color 0.1s; 
        background: #2d3748; 
        color: white; 
        aspect-ratio: 1; 
    }
    
    /* 点击按键时的微缩反弹特效 */
    .btn-grid button:active { 
        transform: scale(0.92); 
    }
    
    /* 运算符特殊橘色 */
    .btn-grid button.operator { 
        background: #ed8936; 
        color: white; 
    }
    .btn-grid button.operator:hover { 
        background: #f6ad55; 
    }
    
    /* 清除键特殊红色 */
    .btn-grid button.clear { 
        background: #e53e3e; 
        color: white; 
    }
    .btn-grid button.clear:hover { 
        background: #fc8181; 
    }
    
    /* 普通数字键悬停 */
    .btn-grid button.num { 
        background: #2d3748; 
    }
    .btn-grid button.num:hover { 
        background: #4a5568; 
    }
</style>

<div class="calc-box">
    <!-- 只读显示屏 -->
    <input type="text" id="screen" readonly value="0">
    
    <div class="btn-grid">
        <button class="clear" onclick="clearScreen()">C</button>
        <button onclick="backspace()" class="num">←</button>
        <button onclick="appendValue('%')" class="num">%</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        
        <button onclick="appendValue('7')" class="num">7</button>
        <button onclick="appendValue('8')" class="num">8</button>
        <button onclick="appendValue('9')" class="num">9</button>
        <button onclick="appendValue('*')" class="operator">*</button>
        
        <button onclick="appendValue('4')" class="num">4</button>
        <button onclick="appendValue('5')" class="num">5</button>
        <button onclick="appendValue('6')" class="num">6</button>
        <button onclick="appendValue('-')" class="operator">-</button>
        
        <button onclick="appendValue('1')" class="num">1</button>
        <button onclick="appendValue('2')" class="num">2</button>
        <button onclick="appendValue('3')" class="num">3</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        
        <!-- 跨两列的长0键 -->
        <button style="grid-column: span 2; border-radius: 30px; aspect-ratio: unset;" onclick="appendValue('0')" class="num">0</button>
        <button onclick="appendValue('.')" class="num">.</button>
        <button onclick="calculateResult()" class="operator">=</button>
    </div>
</div>

<script>
    let screen = document.getElementById('screen');
    let shouldReset = false;

    // 追加输入内容
    function appendValue(val) {
        if (screen.value === '0' || shouldReset) { 
            screen.value = val; 
            shouldReset = false; 
        } else { 
            screen.value += val; 
        }
    }

    // 清屏
    function clearScreen() { 
        screen.value = '0'; 
    }

    // 退格键 (删除最后一位)
    function backspace() {
        if (screen.value.length > 1) {
            screen.value = screen.value.slice(0, -1);
        } else {
            screen.value = '0';
        }
    }

    // 四则运算求解核心
    function calculateResult() {
        if (screen.value === '0' || screen.value === '') return;
        try {
            // 执行前端连续计算并防止 JavaScript 浮点数无限循环
            let result = eval(screen.value);
            screen.value = Number(result.toFixed(6));
            shouldReset = true;
            
            // 📡 触发后端数据库统计，角标数字无刷新 +1
            fetch('/api/inc-calculator', { method: 'POST' });
            let countSpan = document.getElementById('local-calc-count');
            if (countSpan) {
                countSpan.innerText = parseInt(countSpan.innerText) + 1;
            }
        } catch { 
            screen.value = '错误'; 
            shouldReset = true; 
        }
    }
</script>
{% endblock %}
