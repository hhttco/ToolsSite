{% extends 'base.html' %}

{% block content %}
<!-- 动态使用次数小角标 -->
<div class="usage-badge">📊 已累计生成: <span id="local-pwd-count">{{ counts.password }}</span> 次</div>

<h2>智能强密码生成器</h2>
<p class="subtitle">根据您的安全需求，在本地安全生成无法被破解的高强度密码。</p>

<style>
    .result-container { 
        display: flex; 
        gap: 10px; 
        margin-bottom: 25px; 
    }
    #pwd-display { 
        flex: 1; 
        padding: 14px; 
        font-size: 18px; 
        border-radius: 8px; 
        border: 2px solid var(--input-border); 
        background: var(--form-bg); 
        color: #3182ce; 
        font-family: monospace; 
        font-weight: bold; 
        text-align: center; 
        outline: none;
    }
    .btn-action { 
        padding: 12px 20px; 
        font-size: 15px; 
        font-weight: 600; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        transition: transform 0.1s ease;
    }
    .btn-action:active:not(:disabled) {
        transform: scale(0.98);
    }
    .btn-gen { 
        background: linear-gradient(135deg, #3182ce, #2b6cb0); 
        color: white; 
        box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2);
    }
    /* 💡 新增：按钮禁用/锁定状态的样式 */
    .btn-gen:disabled {
        background: #cbd5e0 !important;
        color: #718096 !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
        transform: none !important;
    }
    .btn-copy { 
        background: #38a169; 
        color: white; 
    }
    .option-group { 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
        background: var(--form-bg); 
        padding: 20px; 
        border-radius: 12px; 
        border: 1px solid var(--border-color); 
    }
    .option-item { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        color: var(--text-main); 
    }
    .option-item input[type="checkbox"] { 
        width: 18px; 
        height: 18px; 
        cursor: pointer; 
    }
    .len-box { 
        display: flex; 
        align-items: center; 
        gap: 15px; 
        width: 60%; 
    }
    .len-box input[type="range"] {
        flex: 1;
        cursor: pointer;
    }
</style>

<div class="result-container">
    <input type="text" id="pwd-display" readonly value="点击生成获取密码">
    <button class="btn-action btn-copy" onclick="copyPassword()">📋 复制</button>
</div>

<div class="option-group">
    <div class="option-item">
        <label>密码长度</label>
        <div class="len-box">
            <input type="range" id="pwd-len" min="6" max="32" value="16" oninput="document.getElementById('len-val').innerText = this.value">
            <span style="font-weight: bold; color:#3182ce;" id="len-val">16</span>
        </div>
    </div>
    <div class="option-item">
        <label for="opt-upper">包含大写字母 (A-Z)</label>
        <input type="checkbox" id="opt-upper" checked>
    </div>
    <div class="option-item">
        <label for="opt-lower">包含小写字母 (a-z)</label>
        <input type="checkbox" id="opt-lower" checked>
    </div>
    <div class="option-item">
        <label for="opt-nums">包含数字 (0-9)</label>
        <input type="checkbox" id="opt-nums" checked>
    </div>
    <div class="option-item">
        <label for="opt-symbols">包含特殊字符 (!@#$%^&*)</label>
        <input type="checkbox" id="opt-symbols" checked>
    </div>
</div>

<!-- 给按钮加上 id="gen-btn"，方便 JS 控制禁用和文字切换 -->
<button id="gen-btn" class="btn-action btn-gen" style="width: 100%; margin-top: 20px; padding: 14px; font-size: 16px; font-weight: bold;" onclick="generatePassword(true)">🎲 重新生成安全密码</button>

<script>
    // ─── 💡 前端流控核心变量 ───
    const MAX_REQUESTS = 5;      // 前端限制：1分钟内最多点击5次
    let clickTimestamps = [];    // 记录点击时间戳的数组

    function startCooldown(seconds) {
        const btn = document.getElementById('gen-btn');
        btn.disabled = true;
        
        let timeLeft = seconds;
        btn.innerText = `⏱️ 操作频繁，请等待 ${timeLeft} 秒`;

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "🎲 重新生成安全密码";
            } else {
                btn.innerText = `⏱️ 操作频繁，请等待 ${timeLeft} 秒`;
            }
        }, 1000);
    }

    function generatePassword(isManualClick = false) {
        const length = parseInt(document.getElementById('pwd-len').value);
        const includeUpper = document.getElementById('opt-upper').checked;
        const includeLower = document.getElementById('opt-lower').checked;
        const includeNums = document.getElementById('opt-nums').checked;
        const includeSymbols = document.getElementById('opt-symbols').checked;

        let charPool = "";
        if (includeUpper) charPool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (includeLower) charPool += "abcdefghijklmnopqrstuvwxyz";
        if (includeNums) charPool += "0123456789";
        if (includeSymbols) charPool += "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        if (charPool === "") { 
            alert("请至少选择一种字符类型！"); 
            return; 
        }

        const now = Date.now();

        // ─── 💡 核心修改：前端流控前置拦截逻辑 ───
        if (isManualClick) {
            // 1. 清理 60 秒之前的历史本地点击记录
            clickTimestamps = clickTimestamps.filter(t => now - t < 60000);

            // 2. 检查一分钟内点击次数是否已达上限
            if (clickTimestamps.length >= MAX_REQUESTS) {
                // 计算距离最早一次点击释放还有多少秒
                const oldestClick = clickTimestamps[0];
                const waitSeconds = Math.max(1, Math.ceil((60000 - (now - oldestClick)) / 1000));
                
                // 触发前端冷却锁定，【直接中断】，不生成密码，绝不请求后端
                startCooldown(waitSeconds);
                return; 
            }
        }

        // 3. 没被拦截，执行正常的密码生成
        let password = "";
        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * charPool.length);
            password += charPool[randomIndex];
        }
        document.getElementById('pwd-display').value = password;

        if (isManualClick) {
            // 本次点击有效，记录时间戳
            clickTimestamps.push(now);

            // 向后端发送计次网络请求
            fetch('/api/inc-password', { method: 'POST' })
            .then(async response => {
                // 后端双重保险拦截（万一用户自己写脚本绕过前端）
                if (response.status === 429 || response.status === 403) {
                    const errorData = await response.json();
                    startCooldown(errorData.wait_time || 60);
                    return;
                }
                
                if (response.ok) {
                    let countSpan = document.getElementById('local-pwd-count');
                    if (countSpan) {
                        countSpan.innerText = parseInt(countSpan.innerText) + 1;
                    }
                }
            })
            .catch(err => console.error("上报计数失败:", err));
        }
    }

    function copyPassword() {
        const pwdInput = document.getElementById('pwd-display');
        if (pwdInput.value === "点击生成获取密码") return;
        pwdInput.select();
        pwdInput.setSelectionRange(0, 99999);
        document.execCommand('copy');
        alert("密码已成功复制到剪贴板！");
    }

    // 首屏静默加载，不计入使用次数
    window.onload = function() {
        generatePassword(false);
    };
</script>
{% endblock %}
